name: 二维码登录
on:
  workflow_dispatch:
    inputs:
      number:
        description: "需要登录几个账号？"
        required: true
        default: "1"
      append_user:
        description: "是否追加新账号？（不删除已存在账号信息）"
        required: true
        type: choice
        default: "否"
        options:
          - 是
          - 否
      print_userinfo:
        description: "自动写入失败时是否在日志输出 USERINFO？（含登录token，默认否）"
        required: true
        type: choice
        default: "否"
        options:
          - 否
          - 是
permissions:
  contents: read
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 检出仓库
        uses: actions/checkout@v6
      - name: 创建 Node 环境
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: ./api/package-lock.json
      - name: 检查 GitHub CLI
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt update
            sudo apt install gh -y
          fi
          gh --version
      - name: 缓存依赖
        id: cache-npm
        uses: actions/cache@v5
        with:
          path: ./api/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('./api/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: 安装依赖
        run: npm run install
        if: ${{ steps.cache-npm.outputs.cache-hit != 'true' }}

      # ── 步骤一：生成二维码（落盘字符画文件 + PNG + Summary + 密钥）──
      - name: 生成登录二维码
        id: gen
        run: node qrcodeLogin.js gen
        env:
          NUMBER: ${{ github.event.inputs.number }}
          USERINFO: ${{ secrets.USERINFO }}
          APPEND_USER: ${{ github.event.inputs.append_user }}

      # ── 步骤二：在运行日志中直接输出可扫描的二维码字符画 ──
      # 注意：不使用 ::group:: 折叠，确保二维码在日志中直接可见、便于手机扫描
      - name: 在运行日志中输出二维码
        id: showqr
        if: ${{ success() && steps.gen.outcome == 'success' }}
        run: |
          echo "════════════════════════════════════════════════════════"
          echo "   请使用「酷狗音乐 APP」扫描下方二维码完成登录"
          echo "════════════════════════════════════════════════════════"
          echo ""
          if [ -f qr/qr-ascii.txt ]; then
            cat qr/qr-ascii.txt
          else
            echo "::error::未找到二维码字符画文件，生成步骤可能未成功执行。"
          fi
          echo ""
          echo "────────────────────────────────────────────────────────"
          echo "如无法直接扫描，可复制以下链接到酷狗音乐 App 内扫码："
          if [ -f qr/qr-urls.txt ]; then
            cat qr/qr-urls.txt
          fi
          echo ""
          echo "（二维码同时已写入本次运行的【Summary 摘要】页面，可点击查看清晰图片）"

      # ── 错误处理：生成步骤失败时给出明确提示 ──
      - name: 二维码生成失败提示
        if: ${{ failure() && steps.gen.outcome == 'failure' }}
        run: |
          echo "::error::二维码生成失败，无法继续登录。"
          echo "请检查：1) 运行器网络能否访问酷狗接口；2) 依赖是否安装成功（查看上方「安装依赖」步骤）。"

      # ── 步骤三：轮询等待用户扫码确认 ──
      - name: 等待扫码登录
        id: wait
        if: ${{ success() && steps.gen.outcome == 'success' }}
        run: node qrcodeLogin.js wait
        env:
          USERINFO: ${{ secrets.USERINFO }}
          APPEND_USER: ${{ github.event.inputs.append_user }}
          ALLOW_PRINT_USERINFO: ${{ github.event.inputs.print_userinfo }}
          PAT: ${{ secrets.PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      # ── 上传二维码图片作为备用（仅在存在时）──
      - name: 上传二维码图片
        if: ${{ always() && hashFiles('qr/*') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: 二维码
          path: qr/
          retention-days: 1
